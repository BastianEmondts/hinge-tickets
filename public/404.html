<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // Single-page app redirect for GitHub Pages.
      // When GitHub Pages serves a 404, redirect to the index with the path
      // encoded in the query string so the app can restore it.
      var segmentCount = 1; // number of path segments to keep (repo name counts as 1)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
